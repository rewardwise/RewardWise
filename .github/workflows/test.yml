name: Test

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'RewardWise_MVP0/Frontend/**'
      - '.github/workflows/test.yml'
  push:
    branches: [main]
    paths:
      - 'RewardWise_MVP0/Frontend/**'
      - '.github/workflows/test.yml'

jobs:
  vitest:
    name: Vitest unit tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: RewardWise_MVP0/Frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: RewardWise_MVP0/Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test
