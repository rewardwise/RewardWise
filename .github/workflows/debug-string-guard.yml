name: Debug String Guard

on:
  pull_request:
    branches: [main]

jobs:
  debug-string-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for tagged debug strings in non-test diffs
        run: |
          BASE_REF="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=50

          CHANGED_FILES=$(git diff --name-only "$BASE_REF"...HEAD \
            | grep -vE "(__tests__|\.test\.|\.spec\.|/tests/|test_|\.github/workflows/debug-string-guard\.yml)" \
            || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No non-test files changed. Skipping debug-string check."
            exit 0
          fi

          VIOLATIONS=""
          for file in $CHANGED_FILES; do
            if [ -f "$file" ]; then
              MATCHES=$(grep -nE "\[[A-Z0-9_-]+-DEBUG\]" "$file" || true)
              if [ -n "$MATCHES" ]; then
                VIOLATIONS="${VIOLATIONS}\n${file}:\n${MATCHES}\n"
              fi
            fi
          done

          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Tagged debug strings found in non-test files:"
            echo -e "$VIOLATIONS"
            echo ""
            echo "Pattern matched: [SOMETAG-DEBUG]"
            echo "If this is intentional, the diagnostic instrumentation should be removed before merge."
            echo "If you genuinely need this in production code, change the prefix or add an allowlist."
            exit 1
          fi

          echo "No tagged debug strings detected in non-test diffs."
