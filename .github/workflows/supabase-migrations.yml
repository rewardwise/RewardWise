name: Apply Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - 'RewardWise_MVP0/supabase/migrations/**'
      - '.github/workflows/supabase-migrations.yml'

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  apply:
    name: supabase db push
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: RewardWise_MVP0

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: List migrations present in repo
        run: ls -1 supabase/migrations/

      - name: Link to project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Apply pending migrations
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"

      - name: Summary
        if: always()
        run: echo "::notice::Supabase migrations job finished with status=${{ job.status }}"
