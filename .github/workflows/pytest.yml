name: Pytest

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'RewardWise_MVP0/Backend/**'
      - '.github/workflows/pytest.yml'
  push:
    branches: [main]
    paths:
      - 'RewardWise_MVP0/Backend/**'
      - '.github/workflows/pytest.yml'

jobs:
  pytest:
    name: Backend pytest tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: RewardWise_MVP0/Backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: RewardWise_MVP0/Backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pytest
        run: pip install pytest pytest-asyncio

      - name: Run pytest
        run: python -m pytest tests/
